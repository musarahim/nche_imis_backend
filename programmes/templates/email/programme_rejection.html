<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Programme Application Rejected</title>
  </head>
  <body
    style="font-family: Arial, sans-serif; line-height: 1.6; color: #1f2937"
  >
    <p>Dear {{ institution.name }},</p>

    <p>
      Your programme accreditation application
      <strong>{{ application.application_number }}</strong>
      has been rejected.
    </p>

    <p><strong>Reason:</strong></p>
    <p>{{ reason|default:"No reason provided." }}</p>

    <p>
      Please review the feedback and submit any required revisions if
      applicable.
    </p>

    <p>Regards,<br />NCHE</p>
  </body>
</html>
